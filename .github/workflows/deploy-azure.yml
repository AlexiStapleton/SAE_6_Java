name: Build & Deploy to Azure

on:
  push:
    branches:
      - main # Se déclenche quand une PR est mergée dans main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 3. Build Vaadin en mode production
      - name: Build with Gradle (Vaadin production)
        run: ./gradlew clean build -Pvaadin.productionMode=true --no-daemon

      # 4. Déploiement sur Azure App Service
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: build/libs/*.jar