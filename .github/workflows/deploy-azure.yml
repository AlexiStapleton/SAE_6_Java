name: Build & Deploy to Azure

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle (Vaadin production)
        run: ./gradlew clean build -Pvaadin.productionMode=true --no-daemon -x test --rerun-tasks

      - name: Verify JAR
        run: |
          JAR=$(ls build/libs/*.jar)
          echo "JAR trouvé : $JAR"
          ls -lh build/libs/
          jar tf $JAR | grep "db/migration/"

      - name: Zip JAR for deployment
        run: |
          cd build/libs
          zip deploy.zip *.jar

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: build/libs/deploy.zip