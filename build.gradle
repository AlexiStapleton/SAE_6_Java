plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
	id 'com.vaadin' version '25.1.5' //'24.4.4' //MS added
}

group = 'com.usmb.but3'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

vaadin {
	productionMode = project.hasProperty('vaadin.productionMode')
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
	// MS added for Mockito agent
    // out : 19/06 mockitoAgent
}

repositories {
	mavenCentral()
}

ext {
	//vaadinVersion = '24.4.4' // MS added
	vaadinVersion = '25.1.5' // MS added
}

dependencies {
	developmentOnly('com.vaadin:vaadin-dev')
	implementation 'io.github.cdimascio:dotenv-java:3.0.0'
	implementation 'org.springframework.boot:spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.flywaydb:flyway-core'
	implementation 'org.flywaydb:flyway-database-postgresql'
	implementation 'org.mapstruct:mapstruct:1.5.5.Final'
	implementation 'com.vaadin:vaadin-spring-boot-starter'

	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'org.postgresql:postgresql'

	annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
	annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'
	annotationProcessor 'org.projectlombok:lombok'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	// MS added for Mockito agent
    // out : 19/06 testImplementation 'org.mockito:mockito-core:5.2.0' // or your version
    // out : 19/06 mockitoAgent 'org.mockito:mockito-core:5.2.0' // or your version
	// MS added for Hibernate schema generation
	// MS added for Vaadin
	implementation 'com.vaadin:vaadin-spring-boot-starter'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
	runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

}

dependencyManagement {  // MS added for Vaadin BOM
	imports {
		mavenBom "com.vaadin:vaadin-bom:${vaadinVersion}"
	}
}
jar {
	enabled = false // Désactive le JAR plain, garde uniquement le bootJar
}

tasks.named('test') {
	useJUnitPlatform()
	/* MS added for Mockito agent
    doFirst {
        jvmArgs += "-javaagent:${configurations.mockitoAgent.asPath}"
    } out !  :19/06 */
}
