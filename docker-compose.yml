services:
  db:
    image: postgres:16
    container_name: sae_6_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      bash -c "docker-entrypoint.sh postgres &
               until pg_isready; do sleep 1; done;
               psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'CREATE SCHEMA IF NOT EXISTS biblio;';
               wait"

volumes:
  pgdata: